# =============================================
#   LitePoints - Configuration
# =============================================

# Database: SQLite (data saved in plugins/LitePoints/litepoints.db)
# No setup required!

# Credits given to new players on first join (0 = disabled)
starter-credits: 100

# Messages (support & color codes)
messages:
  balance: "&aYour balance: &e{balance} points"
  not-enough-credits: "&cYou don't have enough points! You need &e{price} &cpoints."
  purchase-success: "&aPurchased &e{amount}x {item} &afor &e{price} points&a! Remaining: &e{balance}"
  inventory-full: "&cYour inventory is full!"
  no-permission: "&cYou don't have permission!"
  starter-credits: "&aWelcome! You received &e{amount} &astarter points!"